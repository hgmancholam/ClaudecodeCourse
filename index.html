<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Code Training · Slides</title>
<link rel="stylesheet" href="theme.css">
<style>
  /* Tokens de color/tipografía y clases .s-xxx viven en theme.css */
  html,body{height:100%; width:100%; overflow:hidden;}
  body{ background:var(--stage-bg); }

  /* ───────────────────────────────────────────────────────────────
     #stage = LIENZO. Es un "container" de tamaño:
       · Presentación  -> ocupa el 100% de la pantalla (cualquier proporción)
       · Exportación    -> JS lo fuerza a 1080×1080 para capturar el cuadrado
     Las unidades cqmin (1% del lado menor del lienzo) hacen que la
     tipografía y los espacios escalen igual en cualquier tamaño, y las
     @container reacomodan el layout según la proporción (ancho vs cuadrado).
     ─────────────────────────────────────────────────────────────── */
  #stage{
    position:relative; width:100%; height:100%;
    container-type:size; container-name:slide;
    background:var(--paper);
  }

  .slide{
    position:absolute; inset:0;
    display:none; flex-direction:column;
    padding:7cqmin 8cqmin 6cqmin;
    background:var(--paper); overflow:hidden;
  }
  .slide.active{display:flex;}

  /* Cinta de color superior identificadora de sección */
  .slide::before{
    content:""; position:absolute; top:0; left:0; right:0; height:1.4cqmin;
    background:var(--accent,var(--proj));
  }

  /* ── Cabecera ── */
  .kicker{
    font-size:2.3cqmin; font-weight:800; letter-spacing:.35cqmin; text-transform:uppercase;
    color:var(--accent,var(--proj));
  }
  .slide h1{font-size:8.4cqmin; line-height:1.05; letter-spacing:-.2cqmin; margin:1.4cqmin 0;}
  .slide h2{font-size:6cqmin; line-height:1.08; letter-spacing:-.1cqmin; margin:.6cqmin 0 .4cqmin;}
  .slide h1 .accent, .slide h2 .accent{color:var(--accent,var(--proj));}
  .lead{font-size:3.2cqmin; line-height:1.45; color:var(--muted); max-width:62ch;}

  /* ── Cuerpo: por defecto 1 columna centrada (ideal para el cuadrado) ── */
  .body{
    flex:1; display:grid; grid-template-columns:1fr;
    align-content:center; gap:2.6cqmin; margin-top:2.4cqmin;
  }
  .body.top{align-content:start;}

  /* Lista de puntos */
  ul.points{list-style:none; display:contents;}
  ul.points li{display:flex; gap:2cqmin; align-items:flex-start; font-size:3.1cqmin; line-height:1.34;}
  ul.points li .ico{
    flex-shrink:0; width:5cqmin; height:5cqmin; border-radius:1.3cqmin;
    background:var(--accent,var(--proj)); color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:2.8cqmin; font-weight:800; margin-top:.2cqmin;
  }
  ul.points li b{color:var(--ink);} ul.points li span{color:var(--muted);}

  /* Filas comando + descripción */
  .cmdrow{display:flex; gap:2.4cqmin; align-items:baseline; padding:1.4cqmin 0; border-bottom:.15cqmin dashed var(--line); font-size:3cqmin;}
  .cmdrow .cmd{font-family:var(--mono); font-weight:700; color:var(--accent,var(--proj)); white-space:nowrap; min-width:26cqmin;}
  .cmdrow .desc{color:var(--muted);}

  /* Bloque destacado / cita */
  .callout{
    border-left:.9cqmin solid var(--accent,var(--proj));
    background:#f8f8fb; border-radius:0 1.6cqmin 1.6cqmin 0;
    padding:3cqmin 3.4cqmin; font-size:3.4cqmin; line-height:1.42;
  }
  code.inline{
    font-family:var(--mono);
    background:#f1f1f6; border:1px solid var(--line); border-radius:.6cqmin;
    padding:.1em .5em; font-size:.92em; color:var(--proj);
  }

  /* Rejilla de referencia: muchas tarjetas de comandos en un solo slide.
     Slide de presentación — no se exporta a 1:1 (demasiado contenido para redes).
     Cada .cat fija su color con su propia clase .s-xxx (estándar del deck). */
  .refgrid{
    flex:1; columns:3; column-gap:2cqmin;
    margin-top:1.2cqmin; overflow:hidden;
    /* altura máxima = espacio disponible entre título y footer */
    max-height:calc(100cqb - 18cqmin);
  }
  .refgrid .cat{break-inside:avoid; border:1px solid var(--line); border-radius:1cqmin; padding:.9cqmin 1.2cqmin .6cqmin; margin-bottom:1.4cqmin;}
  .refgrid .cat h3{font-size:var(--rg-h3,1.4cqmin); font-weight:800; letter-spacing:.12cqmin; text-transform:uppercase; color:#fff; background:var(--accent,var(--proj)); padding:.4cqmin .8cqmin; border-radius:.5cqmin; display:inline-block; margin-bottom:.6cqmin;}
  .refgrid .ln{display:flex; gap:.8cqmin; padding:.28cqmin 0; border-bottom:.1cqmin dashed var(--line); font-size:var(--rg-fs,1.38cqmin); line-height:1.25;}
  .refgrid .ln:last-child{border-bottom:none;}
  .refgrid .ln .k{font-family:var(--mono); font-weight:700; color:var(--accent,var(--proj)); white-space:nowrap; flex-shrink:0;}
  .refgrid .ln a.k{text-decoration:none; color:var(--accent,var(--proj));}
  .refgrid .ln a.k:hover{text-decoration:underline;}
  .refgrid .ln .d{color:var(--muted);}
  /* Bonus-skills: .k stacked above .d so long names don't crowd descriptions.
     Without this, nowrap .k names eat the column width and descriptions wrap to many lines. */
  .slide[data-title="bonus-skills"] .refgrid .ln{flex-direction:column; gap:.15cqmin;}
  .slide[data-title="bonus-skills"] .refgrid .ln .k{white-space:normal; overflow-wrap:break-word; flex-shrink:1;}
  .slide[data-title="bonus-skills"] .refgrid .ln .d{font-size:.85em;}

  /* Tabla comparativa de features (slide features-map) */
  .ctable{width:100%;border-collapse:collapse;table-layout:fixed;flex:1;margin-top:1.2cqmin;}
  .ctable th{background:var(--accent,var(--proj));color:#fff;padding:.75cqmin 1.3cqmin;text-align:left;font-size:1.75cqmin;letter-spacing:.06cqmin;text-transform:uppercase;font-weight:800;}
  .ctable td{padding:.8cqmin 1.3cqmin;border-bottom:.1cqmin solid var(--line);vertical-align:middle;line-height:1.35;color:var(--muted);font-size:1.9cqmin;overflow-wrap:break-word;}
  .ctable tbody tr:last-child td{border-bottom:none;}
  .ctable tbody tr:nth-child(even) td{background:#f8f8fb;}
  .ctable .feat{font-weight:800;color:var(--ink);font-family:var(--mono);font-size:1.8cqmin;white-space:nowrap;}
  .ctable .loc{font-family:var(--mono);font-size:1.68cqmin;color:var(--proj);overflow-wrap:break-word;}
  .ctable .trg{font-family:var(--mono);font-size:1.68cqmin;overflow-wrap:break-word;}

  /* Estado no-exportable (aplicado por JS al #bar cuando el slide activo tiene .no-export) */
  #bar.no-export #exp, #bar.no-export #expAll{ opacity:.25; pointer-events:none; }

  /* Árbol de carpetas */
  .filetree{
    font-family:var(--mono); font-size:2.6cqmin; line-height:1.7;
    background:#f8f8fb; border:1px solid var(--line); border-radius:1.2cqmin;
    padding:2.2cqmin 2.6cqmin; white-space:pre;
  }
  .filetree .dir{color:var(--accent,var(--proj)); font-weight:700;}
  .filetree .note{color:var(--muted); font-family:var(--font); font-style:italic; font-size:.85em;}
  .filetree .optional{opacity:.55;}

  /* Lista de definiciones (término + descripción) */
  dl.defs{display:grid; grid-template-columns:auto 1fr; gap:.5cqmin 1.8cqmin; align-items:baseline;}
  dl.defs dt{font-family:var(--mono); font-weight:700; color:var(--accent,var(--proj)); font-size:2.5cqmin; white-space:nowrap;}
  dl.defs dd{font-size:2.6cqmin; color:var(--muted); line-height:1.35;}

  /* Bloque de código con número de lenguaje */
  .codeblock{
    background:#1a1a2e; border-radius:1.2cqmin; overflow:hidden;
    font-family:var(--mono); font-size:2.3cqmin; line-height:1.6;
  }
  .codeblock .cb-bar{
    background:#2a2a42; padding:.6cqmin 1.4cqmin;
    display:flex; align-items:center; gap:.8cqmin;
  }
  .codeblock .cb-lang{
    font-size:1.7cqmin; font-weight:700; color:var(--accent,var(--proj));
    letter-spacing:.1cqmin; text-transform:uppercase;
  }
  .codeblock .cb-dots{display:flex; gap:.5cqmin;}
  .codeblock .cb-dots span{width:1.1cqmin; height:1.1cqmin; border-radius:50%; background:#444460;}
  .codeblock pre{
    margin:0; padding:1.4cqmin 1.8cqmin; white-space:pre;
    color:#e8e8f4; overflow:hidden;
  }
  .codeblock .kw{color:#c792ea;}   /* keyword */
  .codeblock .fn{color:#82aaff;}   /* function */
  .codeblock .st{color:#c3e88d;}   /* string */
  .codeblock .cm{color:#546e7a; font-style:italic;} /* comment */
  .codeblock .nu{color:#f78c6c;}   /* number/builtin */

  /* Pie de slide */
  .slide footer{
    margin-top:2.6cqmin; display:flex; align-items:center; gap:3cqmin;
    font-size:2.3cqmin; color:var(--muted); border-top:.2cqmin solid var(--line); padding-top:2cqmin;
  }
  .slide footer .brand{font-weight:800; color:var(--ink); margin-right:auto;}
  .slide footer .brand .dot{color:var(--accent,var(--proj));}
  .slide footer .author{color:var(--muted); font-style:italic;}

  /* Portada (variante) */
  .slide.cover .body{align-content:center; gap:0;}
  .slide.cover h1{font-size:11cqmin;}
  .slide.cover .lead{font-size:3.6cqmin; margin-top:2cqmin;}

  /* ── REACOMODO EN PANTALLA ANCHA: 2 columnas que llenan el espacio ── */
  @container slide (min-aspect-ratio: 1.15){
    .body.grid2{grid-template-columns:1fr 1fr; column-gap:7cqmin; row-gap:2.6cqmin;}
    /* en ancho, el texto puede crecer un poco menos relativo y respirar */
    .slide{padding:6.5cqmin 7cqmin 5cqmin;}
    .lead{font-size:2.7cqmin;}
    ul.points li{font-size:2.7cqmin;}
    .cmdrow{font-size:2.6cqmin;}
    .slide h2{font-size:5.2cqmin;}
    .callout{font-size:3cqmin; max-width:none;}
    /* la hoja de referencia aprovecha el ancho con más columnas */
    .refgrid{columns:5; max-height:calc(100cqb - 15cqmin);}
    .refgrid.refgrid-4{columns:4;}
    .refgrid.refgrid-3{columns:3;}
    .refgrid .cat{margin-bottom:1.1cqmin;}
    .refgrid .cat h3{font-size:var(--rg-h3,1.1cqmin);}
    .refgrid .ln{font-size:var(--rg-fs,1.08cqmin); padding:.22cqmin 0;}
    /* Slide 11 · Slash commands (7 cats, 4 cols) — más espacio disponible */
    .slide[data-title="slash-commands"] .refgrid .cat{padding:1cqmin 1.3cqmin .7cqmin; margin-bottom:1.2cqmin;}
    .slide[data-title="slash-commands"] .refgrid .cat h3{font-size:1.4cqmin;}
    .slide[data-title="slash-commands"] .refgrid .ln{font-size:1.38cqmin; padding:.34cqmin 0;}
    /* Slide 14 · Bonus Skills (7 cats, 43 skills) — máxima densidad */
    .slide[data-title="bonus-skills"] .refgrid{columns:5; max-height:calc(100cqb - 14cqmin);}
    .slide[data-title="bonus-skills"] .refgrid .cat{padding:.6cqmin .9cqmin .4cqmin; margin-bottom:.9cqmin;}
    .slide[data-title="bonus-skills"] .refgrid .cat h3{font-size:var(--rg-h3,.95cqmin);}
    .slide[data-title="bonus-skills"] .refgrid .ln{font-size:var(--rg-fs,.9cqmin); padding:.2cqmin 0; gap:.1cqmin;}
    /* Slide 12 · Atajos & CLI (3 cats, 3 cols) — mucho más espacio, fuente mayor */
    .slide[data-title="atajos-cli"] .refgrid .cat{padding:1.5cqmin 2cqmin 1.2cqmin; margin-bottom:1.8cqmin;}
    .slide[data-title="atajos-cli"] .refgrid .cat h3{font-size:2.1cqmin;}
    .slide[data-title="atajos-cli"] .refgrid .ln{font-size:2.05cqmin; padding:.58cqmin 0; gap:1.1cqmin;}
    /* Features map: wide screen — fuente más grande para llenar el espacio */
    .slide[data-title="features-map"] .ctable th{font-size:2cqmin; padding:.8cqmin 1.5cqmin;}
    .slide[data-title="features-map"] .ctable td{font-size:2.3cqmin; padding:.9cqmin 1.5cqmin;}
    .slide[data-title="features-map"] .ctable .feat{font-size:2.15cqmin;}
    .slide[data-title="features-map"] .ctable .loc,.slide[data-title="features-map"] .ctable .trg{font-size:2cqmin;}
    .slide.no-export{padding:4cqmin 4.5cqmin 3.5cqmin;}
    .codeblock{font-size:1.9cqmin;}
    .codeblock .cb-lang{font-size:1.4cqmin;}
    .filetree{font-size:2.1cqmin;}
    dl.defs dt{font-size:2cqmin;} dl.defs dd{font-size:2.1cqmin;}
  }
  /* En formato cuadrado (exportación 1:1): solo el árbol, sin definiciones */
  @container slide (max-aspect-ratio: 1.14){
    dl.defs{display:none;}
    /* start + h2 más chico para dejar espacio al árbol */
    .body.grid2{align-content:start;}
    .slide h2{font-size:4.8cqmin;}
    .filetree{font-size:2.4cqmin; line-height:1.62; padding:1.8cqmin 2.2cqmin;}
    /* Contexto slide: en 1:1 solo los puntos, sin callout de alcances */
    .slide.s-flow .callout{display:none;}
    .slide.s-flow .body.grid2{display:flex; flex-direction:column;}
    .slide.s-flow .ctx-left{width:100%;}
    .slide.s-flow ul.points li{font-size:3.5cqmin;}
    .slide.s-flow ul.points .ico{width:5.2cqmin; height:5.2cqmin; font-size:2.5cqmin;}
    /* SDK slide: en 1:1 solo los puntos, sin codeblock */
    .slide.s-mode .codeblock{display:none;}
    .slide.s-mode .body.grid2{display:flex; flex-direction:column;}
    .slide.s-mode .sdk-left{width:100%;}
    .slide.s-mode ul.points li{font-size:3.8cqmin;}
    .slide.s-mode ul.points .ico{width:5.5cqmin; height:5.5cqmin; font-size:2.6cqmin;}
    /* Hooks slide: en 1:1 solo los puntos, sin codeblock */
    .slide.s-env .codeblock{display:none;}
    .slide.s-env .body.grid2{display:flex; flex-direction:column;}
    .slide.s-env .hooks-left{width:100%;}
    .slide.s-env ul.points li{font-size:3.5cqmin;}
    .slide.s-env ul.points .ico{width:5.2cqmin; height:5.2cqmin; font-size:2.5cqmin;}
    /* Custom commands slide: en 1:1 solo los puntos, sin codeblock */
    .slide.s-short .codeblock{display:none;}
    .slide.s-short .body.grid2{display:flex; flex-direction:column;}
    .slide.s-short .skills-left{width:100%;}
    .slide.s-short ul.points li{font-size:3.2cqmin;}
    .slide.s-short ul.points .ico{width:5cqmin; height:5cqmin; font-size:2.4cqmin;}
    /* que-es slide: hide callout at 1:1 (4 points + loop diagram would overflow) */
    .slide[data-title="que-es-claude-code"] .callout{display:none;}
    /* installing slide: hide codeblock at 1:1, show only the 5 install points */
    .slide[data-title="installing-claude"] .codeblock{display:none;}
    .slide[data-title="installing-claude"] .body.grid2{display:flex; flex-direction:column;}
    .slide[data-title="installing-claude"] .install-left{width:100%;}
  }

  /* ── Controles (no se exportan) ── */
  #bar{
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    display:flex; gap:8px; align-items:center;
    background:rgba(20,20,30,.82); backdrop-filter:blur(6px);
    border:1px solid #2a2a3a; border-radius:14px; padding:8px 12px; z-index:50;
    opacity:.35; transition:opacity .2s;
  }
  #bar:hover{opacity:1;}
  #bar button{background:#23233a; color:#e8e8f0; border:1px solid #34344e; border-radius:9px; padding:8px 12px; font-size:14px; cursor:pointer; font-weight:600;}
  #bar button:hover{background:#32324f;}
  #bar .count{color:#9a9ab0; font-size:14px; padding:4px 8px; min-width:64px; text-align:center; cursor:pointer; border-radius:8px; position:relative; transition:background .15s;}
  #bar .count:hover{background:#23233a; color:#e8e8f0;}
  #bar .sep{width:1px; height:24px; background:#34344e; margin:0 4px;}
  /* Language button active state */
  #lang-btn.lang-es{background:#2a2a42; color:#a0a0e8; border-color:#5050a0;}
  /* ── Slide picker (dropdown del contador) ── */
  #slide-picker{
    display:none; flex-direction:column; gap:5px;
    position:absolute; bottom:calc(100% + 10px); left:50%; transform:translateX(-50%);
    background:rgba(18,18,28,.97); backdrop-filter:blur(10px);
    border:1px solid #2a2a3a; border-radius:12px; padding:8px;
    min-width:230px; max-width:300px;
    box-shadow:0 -6px 24px rgba(0,0,0,.5);
    z-index:60;
  }
  #slide-picker.open{display:flex;}
  #picker-input{
    background:#23233a; border:1px solid #3a3a54; border-radius:7px;
    color:#e8e8f4; padding:6px 10px; font-size:13px; width:100%;
    outline:none; font-family:var(--font);
  }
  #picker-input:focus{border-color:#5b5b8b;}
  #picker-list{list-style:none; margin:0; padding:0; max-height:240px; overflow-y:auto;}
  #picker-list::-webkit-scrollbar{width:4px;}
  #picker-list::-webkit-scrollbar-thumb{background:#3a3a54; border-radius:4px;}
  #picker-list li{
    display:flex; gap:8px; align-items:baseline;
    padding:5px 8px; border-radius:7px; cursor:pointer;
    color:#9a9ab0; font-size:12px; transition:background .1s;
  }
  #picker-list li:hover{background:#23233a; color:#e8e8f4;}
  #picker-list li.picker-active{color:#e8e8f4; background:#2a2a42;}
  #picker-list li .pi-num{font-family:var(--mono); font-size:11px; color:#5b5b7b; min-width:20px; flex-shrink:0;}
  #picker-list li .pi-title{flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  #picker-list li.picker-active .pi-num{color:var(--accent-default);}
  #hint{position:fixed; top:14px; left:50%; transform:translateX(-50%); color:#6a6a82; font-size:13px; z-index:50; opacity:.6;}
  body.exporting #bar, body.exporting #hint{display:none;}
</style>
</head>
<body>

<div id="hint">← → navigate · F fullscreen · E export slide (1:1) · A export all · L language</div>

<div id="stage">
  <!-- [slides injected by JS from slides/*.js] -->
</div>

<div id="bar">
  <button id="prev">←</button>
  <span class="count" id="count-wrap" title="Click to choose slide">
    <span id="cur">1</span> / <span id="tot">1</span>
    <div id="slide-picker">
      <input id="picker-input" type="number" min="1" placeholder="Go to slide #…">
      <ul id="picker-list"></ul>
    </div>
  </span>
  <button id="next">→</button>
  <span class="sep"></span>
  <button id="lang-btn">ES</button>
  <button id="full">⛶ Fullscreen</button>
  <button id="exp">⬇ Slide 1:1</button>
  <button id="expAll">⬇ All 1:1</button>
</div>

<!-- ── Slides: cada archivo pushea {en, es} a window._deck ── -->
<!-- Para agregar un slide: crea slides/NN-nombre.js y añade la línea aquí -->
<script src="slides/01-portada.js"></script>
<script src="slides/02-que-es-claude-code.js"></script>
<script src="slides/03-claude-modes.js"></script>
<script src="slides/04-installing-claude.js"></script>
<script src="slides/05-contexto-memoria.js"></script>
<script src="slides/06-claude-agent-sdk.js"></script>
<script src="slides/07-estructura-proyecto.js"></script>
<script src="slides/08-subagents.js"></script>
<script src="slides/09-custom-commands.js"></script>
<script src="slides/10-hooks.js"></script>
<script src="slides/11-slash-commands.js"></script>
<script src="slides/12-atajos-cli.js"></script>
<script src="slides/13-features-map.js"></script>
<script src="slides/14-bonus-skills.js"></script>
<script src="slides/15-gracias.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  const stage      = document.getElementById('stage');
  const bar        = document.getElementById('bar');
  const countWrap  = document.getElementById('count-wrap');
  const picker     = document.getElementById('slide-picker');
  const pickerInput= document.getElementById('picker-input');
  const pickerList = document.getElementById('picker-list');
  const langBtn    = document.getElementById('lang-btn');

  let lang   = 'en';
  let slides = [];
  let idx    = 0;

  // ── Render deck in the current language ──
  function renderDeck() {
    const savedIdx = idx;
    stage.innerHTML = (window._deck || []).map(s =>
      typeof s === 'string' ? s : (s[lang] || s.en)
    ).join('\n');
    slides = Array.from(stage.querySelectorAll('.slide'));
    document.getElementById('tot').textContent = slides.length;
    slides.forEach((s,i)=>{ const pg=s.querySelector('.pg'); if(pg) pg.textContent=(i+1)+' / '+slides.length; });
    buildPickerList();
    show(Math.min(savedIdx, slides.length - 1));
  }

  // ── Auto-fit: grow .refgrid font to fill available height ──
  // Uses CSS custom properties --rg-fs / --rg-h3 (inline style on .refgrid).
  // Multi-column layouts don't expose overflow via scrollHeight, so we measure
  // the bottom edge of the lowest .cat via getBoundingClientRect() instead.
  // Binary-searches for the largest cqmin value where content fits in the grid.
  // Skipped during PNG export to preserve the 1080×1080 layout.
  function fitRefgrid(slide) {
    if (!slide || document.body.classList.contains('exporting')) return;
    const grid = slide.querySelector('.refgrid');
    if (!grid) return;
    grid.style.removeProperty('--rg-fs');
    grid.style.removeProperty('--rg-h3');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      const avail = grid.getBoundingClientRect().height;
      if (!avail) return;

      // True rendered content height in the multi-column layout.
      function usedHeight() {
        const top = grid.getBoundingClientRect().top;
        let max = 0;
        grid.querySelectorAll('.cat').forEach(c => {
          max = Math.max(max, c.getBoundingClientRect().bottom - top);
        });
        return max;
      }

      const nat = usedHeight();
      if (!nat || nat >= avail * 0.98) return; // already fills space

      let lo = 0.3, hi = Math.min(12, (avail / nat) * 1.05);
      for (let i = 0; i < 30; i++) {
        const m = (lo + hi) / 2;
        grid.style.setProperty('--rg-fs', m.toFixed(4) + 'cqmin');
        grid.style.setProperty('--rg-h3', (m * 0.95).toFixed(4) + 'cqmin');
        usedHeight() <= avail ? (lo = m) : (hi = m);
      }
      grid.style.setProperty('--rg-fs', lo.toFixed(4) + 'cqmin');
      grid.style.setProperty('--rg-h3', (lo * 0.95).toFixed(4) + 'cqmin');
    }));
  }
  let _fitTimer;
  addEventListener('resize', () => { clearTimeout(_fitTimer); _fitTimer = setTimeout(() => fitRefgrid(slides[idx]), 150); });

  function show(n){
    idx = (n + slides.length) % slides.length;
    slides.forEach((s,i)=> s.classList.toggle('active', i===idx));
    document.getElementById('cur').textContent = idx+1;
    bar.classList.toggle('no-export', slides[idx].classList.contains('no-export'));
    if(picker.classList.contains('open')) refreshPickerActive();
    fitRefgrid(slides[idx]);
  }
  const next=()=>show(idx+1), prev=()=>show(idx-1);

  document.getElementById('next').onclick=next;
  document.getElementById('prev').onclick=prev;
  document.getElementById('full').onclick=()=>{ document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen(); };

  // ── Language toggle ──
  langBtn.onclick = () => {
    lang = (lang === 'en') ? 'es' : 'en';
    langBtn.textContent = (lang === 'en') ? 'ES' : 'EN';
    langBtn.classList.toggle('lang-es', lang === 'es');
    renderDeck();
  };

  addEventListener('keydown', e=>{
    if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){ next(); e.preventDefault(); }
    else if(e.key==='ArrowLeft'||e.key==='PageUp') prev();
    else if(e.key==='f'||e.key==='F') document.getElementById('full').click();
    else if(e.key==='e'||e.key==='E') exportSlide(idx);
    else if(e.key==='a'||e.key==='A') exportAll();
    else if(e.key==='l'||e.key==='L') langBtn.click();
    else if(e.key==='Home') show(0);
    else if(e.key==='End') show(slides.length-1);
  });

  // ── Exportación a PNG 1:1 ──
  function download(canvas, name){ const a=document.createElement('a'); a.href=canvas.toDataURL('image/png'); a.download=name+'.png'; a.click(); }
  async function exportSlide(i){
    document.body.classList.add('exporting');
    const pw=stage.style.width, ph=stage.style.height;
    stage.style.width='1080px'; stage.style.height='1080px';
    const prevActive=idx; slides.forEach((s,k)=> s.classList.toggle('active', k===i));
    await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
    try{
      const c=await html2canvas(slides[i], {scale:2, backgroundColor:'#ffffff', width:1080, height:1080, windowWidth:1080, windowHeight:1080});
      download(c, String(i+1).padStart(2,'0')+'-'+(slides[i].dataset.title||('slide-'+(i+1))));
    } finally {
      slides.forEach((s,k)=> s.classList.toggle('active', k===prevActive));
      stage.style.width=pw; stage.style.height=ph;
      document.body.classList.remove('exporting');
    }
  }
  async function exportAll(){ for(let i=0;i<slides.length;i++){ await exportSlide(i); await new Promise(r=>setTimeout(r,300)); } }
  document.getElementById('exp').onclick=()=>exportSlide(idx);
  document.getElementById('expAll').onclick=exportAll;

  // ── Slide picker ──
  function buildPickerList(){
    pickerList.innerHTML='';
    slides.forEach((s,i)=>{
      const li=document.createElement('li');
      li.dataset.idx=i;
      const rawTitle = s.dataset.title
        ? s.dataset.title.replace(/-/g,' ')
        : (s.querySelector('h1,h2')?.textContent||'Slide '+(i+1)).trim();
      li.innerHTML=`<span class="pi-num">${String(i+1).padStart(2,'0')}</span><span class="pi-title">${rawTitle}</span>`;
      li.onclick=()=>{ show(i); closePicker(); };
      pickerList.append(li);
    });
  }

  function refreshPickerActive(){
    pickerList.querySelectorAll('li').forEach((li,i)=>li.classList.toggle('picker-active',i===idx));
    const active=pickerList.querySelector('.picker-active');
    if(active) active.scrollIntoView({block:'nearest'});
  }

  function openPicker(){
    picker.classList.add('open');
    pickerList.querySelectorAll('li').forEach(li=>li.style.display='');
    refreshPickerActive();
    pickerInput.value='';
    requestAnimationFrame(()=>pickerInput.focus());
  }

  function closePicker(){ picker.classList.remove('open'); }

  countWrap.addEventListener('click', e=>{ e.stopPropagation(); picker.classList.contains('open')?closePicker():openPicker(); });
  document.addEventListener('click', closePicker);
  picker.addEventListener('click', e=>e.stopPropagation());

  pickerInput.addEventListener('input', ()=>{
    const q=pickerInput.value.trim();
    pickerList.querySelectorAll('li').forEach(li=>{
      const n=parseInt(li.dataset.idx)+1;
      const title=li.querySelector('.pi-title').textContent.toLowerCase();
      li.style.display=(!q||String(n).startsWith(q)||title.includes(q.toLowerCase()))?'':'none';
    });
  });

  pickerInput.addEventListener('keydown', e=>{
    if(e.key==='Enter'){
      const n=parseInt(pickerInput.value);
      if(n>=1&&n<=slides.length){ show(n-1); closePicker(); }
      e.preventDefault(); e.stopPropagation();
    } else if(e.key==='Escape'){
      closePicker(); e.preventDefault(); e.stopPropagation();
    } else {
      e.stopPropagation();
    }
  });

  // Inicialización sincrónica — slides already in DOM via <script src>
  renderDeck();
</script>
</body>
</html>
