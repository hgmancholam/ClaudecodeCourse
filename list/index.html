<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Presentations · AI Capabilities Training</title>
<link rel="stylesheet" href="../theme.css">
<link rel="stylesheet" href="../gallery.css">
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div>
        <div class="kicker" id="kicker"></div>
        <h1 id="title"></h1>
      </div>
      <button id="lang-btn">ES</button>
      <p class="sub" id="sub"></p>
    </header>
    <div class="grid" id="grid"></div>
    <footer class="foot"><span class="author">Giovanny Manchola</span> · 2026</footer>
  </div>

  <script src="../presentations.js"></script>
  <script>
    // Cada presentación de nivel superior: si es curso (chapters) o deck simple,
    // su tarjeta apunta igualmente a ../<slug>/ (índice de capítulos o el deck).
    window.GALLERY_CONFIG = {
      items: window.PRESENTATIONS || [],
      hrefFor: p => `../${p.slug}/`,
      i18n: {
        en: { kicker: 'AI Capabilities Training', title: 'Presentations', sub: 'Pick a deck to open.' },
        es: { kicker: 'Capacitación en IA', title: 'Presentaciones', sub: 'Elige un deck para abrir.' }
      }
    };
  </script>
  <script src="../gallery.js"></script>
</body>
</html>
