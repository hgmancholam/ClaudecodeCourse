<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Code Basics · Slides</title>
<!-- Tokens compartidos + framework del deck (extraídos a la raíz para reusarse en cada presentación) -->
<link rel="stylesheet" href="../theme.css">
<link rel="stylesheet" href="../deck.css">
</head>
<body>

<div id="stage">
  <!-- [slides injected by JS from slides/*.js] -->
</div>

<div id="bar">
  <a id="home" class="btn" href="../list/" title="All presentations">≡</a>
  <span class="sep"></span>
  <button id="prev">←</button>
  <span class="count" id="count-wrap" title="Click to choose slide">
    <span id="cur">1</span> / <span id="tot">1</span>
    <div id="slide-picker">
      <input id="picker-input" type="number" min="1" placeholder="Go to slide #…">
      <ul id="picker-list"></ul>
    </div>
  </span>
  <button id="next">→</button>
  <span class="sep"></span>
  <button id="lang-btn">ES</button>
  <button id="full">⛶ Fullscreen</button>
  <button id="expPdf">⬇ PDF</button>
</div>

<!-- ── Slides: cada archivo pushea {en, es} a window._deck ── -->
<!-- Para agregar un slide: crea slides/NN-nombre.js y añade la línea aquí -->
<script src="slides/01-portada.js"></script>
<script src="slides/02-que-es-claude-code.js"></script>
<script src="slides/03-claude-modes.js"></script>
<script src="slides/04-installing-claude.js"></script>
<script src="slides/05-contexto-memoria.js"></script>
<script src="slides/06-claude-agent-sdk.js"></script>
<script src="slides/07-estructura-proyecto.js"></script>
<script src="slides/08-subagents.js"></script>
<script src="slides/09-custom-commands.js"></script>
<script src="slides/10-hooks.js"></script>
<script src="slides/11-slash-commands.js"></script>
<script src="slides/12-atajos-cli.js"></script>
<script src="slides/13-features-map.js"></script>
<script src="slides/14-bonus-skills.js"></script>
<script src="slides/15-gracias.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="../deck.js"></script>
</body>
</html>
