<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TDM · Chapter 0 — Overview</title>
<!-- Capítulo de un curso: el framework vive 2 niveles arriba, en la raíz -->
<link rel="stylesheet" href="../../theme.css">
<link rel="stylesheet" href="../../deck.css">
</head>
<body>

<div id="stage">
  <!-- [slides injected by JS from slides/*.js] -->
</div>

<div id="bar">
  <a id="home" class="btn" href="../" title="Course chapters">≡</a>
  <span class="sep"></span>
  <button id="prev">←</button>
  <span class="count" id="count-wrap" title="Click to choose slide">
    <span id="cur">1</span> / <span id="tot">1</span>
    <div id="slide-picker">
      <input id="picker-input" type="number" min="1" placeholder="Go to slide #…">
      <ul id="picker-list"></ul>
    </div>
  </span>
  <button id="next">→</button>
  <span class="sep"></span>
  <button id="lang-btn">ES</button>
  <button id="full">⛶ Fullscreen</button>
  <button id="exp">⬇ Slide 1:1</button>
  <button id="expPdf">⬇ PDF</button>
</div>

<!-- ── Slides: cada archivo pushea {en, es} a window._deck ── -->
<script src="slides/01-portada.js"></script>
<script src="slides/02-audiencia.js"></script>
<script src="slides/03-objetivos.js"></script>
<script src="slides/04-estructura.js"></script>
<script src="slides/06-dinamica.js"></script>
<script src="slides/07-reglas.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="../../deck.js"></script>
</body>
</html>
