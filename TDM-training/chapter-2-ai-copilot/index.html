<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Delivery Lead · W2 — AI as a Copilot</title>
<!-- Capítulo de un curso: el framework vive 2 niveles arriba, en la raíz -->
<link rel="stylesheet" href="../../theme.css">
<link rel="stylesheet" href="../../deck.css">
</head>
<body>

<div id="stage">
  <!-- [slides injected by JS from slides/*.js] -->
</div>

<div id="bar">
  <a id="home" class="btn" href="../" title="Course chapters">≡</a>
  <span class="sep"></span>
  <button id="prev">←</button>
  <span class="count" id="count-wrap" title="Click to choose slide">
    <span id="cur">1</span> / <span id="tot">1</span>
    <div id="slide-picker">
      <input id="picker-input" type="number" min="1" placeholder="Go to slide #…">
      <ul id="picker-list"></ul>
    </div>
  </span>
  <button id="next">→</button>
  <span class="sep"></span>
  <button id="lang-btn">ES</button>
  <button id="full">⛶ Fullscreen</button>
  <button id="exp">⬇ Slide 1:1</button>
  <button id="expAll">⬇ All 1:1</button>
</div>

<!-- ── Slides: cada archivo pushea {en, es} a window._deck ── -->
<script src="slides/01-portada.js"></script>
<script src="slides/02-temas.js"></script>
<script src="slides/03-caso-real.js"></script>
<script src="slides/04-anatomia-prompt.js"></script>
<script src="slides/05-ejemplo-prompt.js"></script>
<script src="slides/06-backlog-b01.js"></script>
<script src="slides/07-backlog-b02-b03.js"></script>
<script src="slides/08-riesgos-r01.js"></script>
<script src="slides/09-riesgos-r02-r03.js"></script>
<script src="slides/10-reporting-rp01.js"></script>
<script src="slides/11-reporting-rp02-rp03.js"></script>
<script src="slides/12-checklist-pack.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="../../deck.js"></script>
</body>
</html>
