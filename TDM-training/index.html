<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TDM Training · Chapters</title>
<link rel="stylesheet" href="../theme.css">
<link rel="stylesheet" href="../gallery.css">
</head>
<body>
  <div class="wrap">
    <header class="top">
      <nav class="crumbs" id="crumbs"></nav>
      <div>
        <div class="kicker" id="kicker"></div>
        <h1 id="title"></h1>
      </div>
      <button id="lang-btn">ES</button>
      <p class="sub" id="sub"></p>
    </header>
    <div class="grid" id="grid"></div>
    <footer class="foot"><span class="author">Giovanny Manchola</span> · 2026</footer>
  </div>

  <script src="../presentations.js"></script>
  <script>
    // Índice de capítulos de este curso. Se localiza en el registro por su slug.
    const COURSE_SLUG = 'TDM-training';
    const course = (window.PRESENTATIONS || []).find(p => p.slug === COURSE_SLUG) || {};
    window.GALLERY_CONFIG = {
      items: course.chapters || [],
      hrefFor: ch => `${ch.slug}/`,          // /TDM-training/<chapter>/
      slugBase: '/' + COURSE_SLUG,
      crumbs: [
        { href: '../list/', en: 'All presentations', es: 'Todas las presentaciones' },
        { en: (course.en && course.en.title) || COURSE_SLUG, es: (course.es && course.es.title) || COURSE_SLUG }
      ],
      i18n: {
        en: { kicker: (course.en && course.en.tag) || 'Course',
              title:  (course.en && course.en.title) || COURSE_SLUG,
              sub:    (course.en && course.en.desc) || 'Pick a chapter to open.' },
        es: { kicker: (course.es && course.es.tag) || 'Curso',
              title:  (course.es && course.es.title) || COURSE_SLUG,
              sub:    (course.es && course.es.desc) || 'Elige un capítulo para abrir.' }
      }
    };
  </script>
  <script src="../gallery.js"></script>
</body>
</html>
